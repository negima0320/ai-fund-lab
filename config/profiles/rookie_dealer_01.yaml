# AI Fund Lab profile YAML
# このファイルはAIファンド人格ごとの差分設定です。
# 共通のDB、Broker、安全設定、J-Quants設定などは config/rookie_dealer.yaml をベースにし、
# ここでは profile_id / character / features / trading / selection / risk_margin を上書きします。
# 秘密情報は書かず、APIキーや口座情報は .env に置きます。

profile_id: rookie_dealer_01
profile_name: 新人ディーラー1号
description: 教科書通りにしか動けないお堅い新人ディーラー

# 人格設定。記事、コメント、AI Decisionの説明文で参照する。
character:
  role: 新人ディーラー
  personality:
    - 教科書通り
    - データ重視
    - 感情なし
    - ルール厳守
  catchphrases:
    - ルールに従います
    - 感情は考慮しません
    - 統計的優位性を優先します

# profileごとの機能ON/OFF。
# falseにしても共通ロジックは残り、実行時に使わないだけにする。
features:
  market_context: true
  sector_analysis: true
  ai_decision: false
  news: true
  candlestick_analysis: true
  openai_commentary: false

# OpenAI APIによる最終判断を使うかどうか
# falseの場合、ルールベースのスコアリング結果だけで売買判断する
# OPENAI_API_KEYが未設定の場合は、自動的にrule_basedへフォールバックする
ai_decision:
  enabled: false
  provider: openai
  fallback_to_rule_based: true
  daily_call_limit: 3

# コメント生成方式
# rule_based: API不要、無料、安定
# openai: 自然な文章になるがAPIコストが発生
ai_commentary:
  enabled: true
  provider: rule_based
  fallback_to_rule_based: true

# Broker設定。
# paper: 仮想売買のみ。証券会社APIへ発注しない。
broker:
  provider: paper
  live_trading_enabled: false

# Safety設定。
# allow_live_trading: false のため、実売買は許可しない。
safety:
  mode: paper
  allow_live_trading: false
  require_manual_approval_for_live: true

initial_capital: 1000000

# 売買ルールのprofile差分。
# 共通configの portfolio / risk / trading に変換される。
trading:
  max_positions: 5
  position_size_ratio: 0.20
  stop_loss_rate: -0.03
  take_profit_rate: 0.06
  max_holding_days: 5
  use_round_lot: true
  round_lot_size: 100

execution:
  stop_loss_execution: next_day_open

# 選定ルールのprofile差分。
selection:
  min_score: 45
  fallback_min_score: 40
  min_confidence: 0.70
  allow_top_pick_when_no_selection: true
  top_pick_min_score: 40
  max_selected: 5

# 安全余力のprofile差分。
risk_margin:
  max_daily_buy_amount: 300000
  max_single_order_amount: 200000
  stop_trading_if_daily_loss_rate_exceeds: -0.05
  stop_trading_if_drawdown_exceeds: -0.15
