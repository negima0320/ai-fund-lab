# AI Fund Lab profile YAML
# rookie_dealer_02_v2_1 をベースに、J-Quants財務情報capabilityの互換検証に使うprofileです。
# 現時点では売買スコアへfinancial_scoreを加算せず、financial_statementsがFree/Lightで利用可能かを検証します。
# 秘密情報は書かず、APIキーや口座情報は .env に置きます。

profile_id: rookie_dealer_02_v2_9
profile_name: 新人ディーラー2号 v2.9
description: v2.1にJ-Quants財務情報capability検証を追加した互換テスト版

features:
  market_context: true
  sector_analysis: true
  ai_decision: false
  news: false
  candlestick_analysis: true
  financial_context: true
  openai_commentary: false

scoring:
  total_score_formula: technical_plus_market_penalty
  use_financial_score: false

selection:
  min_score: 45
  fallback_min_score: 40
  min_confidence: 0.70
  allow_top_pick_when_no_selection: true
  top_pick_min_score: 40
  max_selected: 5
  max_rsi_for_new_position: 65
  reject_overheated_rsi: true

volume_filter:
  enabled: true
  min_volume_ratio: 2.0

earnings_filter:
  enabled: false
  block_before_business_days: 1
  block_on_earnings_day: true
  block_after_business_days: 1
  action: reject_new_buy
  allow_sell: true
  fail_open: true
