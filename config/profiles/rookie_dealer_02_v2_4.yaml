# AI Fund Lab profile YAML
# rookie_dealer_02_v2_1 をベースにした条件分岐型の低スコア例外採用検証用profileです。
# 秘密情報は書かず、APIキーや口座情報は .env に置きます。

profile_id: rookie_dealer_02_v2_4
profile_name: 新人ディーラー2号 v2.4
description: v2.1をベースに、score 65-69を強い出来高・ローソク足条件付きで例外採用する検証版

character:
  role: 新人ディーラー
  personality:
    - 教科書通り
    - データ重視
    - 損切り最優先
    - 過熱銘柄を追わない
    - 出来高確認を重視
    - 低スコアは条件付きで扱う
    - リスク管理重視
  catchphrases:
    - 過熱した銘柄は追いません
    - 出来高3倍とブレイクアウトを確認します
    - 低スコアは強い条件が揃った時だけ採用します
    - 損失限定を最優先します

features:
  market_context: true
  sector_analysis: true
  ai_decision: false
  news: true
  candlestick_analysis: true
  openai_commentary: false

ai_decision:
  enabled: false
  provider: openai
  fallback_to_rule_based: true
  daily_call_limit: 3

ai_commentary:
  enabled: true
  provider: rule_based
  fallback_to_rule_based: true

initial_capital: 1000000

trading:
  max_positions: 5
  position_size_ratio: 0.20
  stop_loss_rate: -0.03
  take_profit_rate: 0.06
  max_holding_days: 5
  use_round_lot: true
  round_lot_size: 100

execution:
  stop_loss_execution: intraday_stop

selection:
  min_score: 70
  fallback_min_score: 65
  min_confidence: 0.70
  allow_top_pick_when_no_selection: true
  top_pick_min_score: 65
  max_selected: 5
  max_rsi_for_new_position: 65
  reject_overheated_rsi: true
  conditional_selection:
    enabled: true
    low_score_range:
      min: 65
      max: 69
    allow_if:
      min_volume_ratio: 3.0
      required_candlestick_signals:
        - volume_confirmed_breakout
      min_rsi: 50
      max_rsi: 65
      allowed_market_regimes:
        - risk_on
        - neutral

volume_filter:
  enabled: true
  min_volume_ratio: 2.0

risk_margin:
  max_daily_buy_amount: 300000
  max_single_order_amount: 200000
  stop_trading_if_daily_loss_rate_exceeds: -0.05
  stop_trading_if_drawdown_exceeds: -0.15
