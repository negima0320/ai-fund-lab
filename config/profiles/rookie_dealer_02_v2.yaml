# AI Fund Lab profile YAML
# rookie_dealer_02 をベースにしたRSI過熱フィルター検証用profileです。
# 秘密情報は書かず、APIキーや口座情報は .env に置きます。

profile_id: rookie_dealer_02_v2
profile_name: 新人ディーラー2号 v2
description: 2号機をベースに、RSI過熱銘柄を避ける改善版

character:
  role: 新人ディーラー
  personality:
    - 教科書通り
    - データ重視
    - 損切り最優先
    - 過熱銘柄を追わない
    - リスク管理重視
  catchphrases:
    - 過熱した銘柄は追いません
    - RSIを確認してから判断します
    - 損失限定を最優先します

features:
  market_context: true
  sector_analysis: true
  ai_decision: false
  news: true
  candlestick_analysis: true
  openai_commentary: false

ai_decision:
  enabled: false
  provider: openai
  fallback_to_rule_based: true
  daily_call_limit: 3

ai_commentary:
  enabled: true
  provider: rule_based
  fallback_to_rule_based: true

initial_capital: 1000000

trading:
  max_positions: 5
  position_size_ratio: 0.20
  stop_loss_rate: -0.03
  take_profit_rate: 0.06
  max_holding_days: 5
  use_round_lot: true
  round_lot_size: 100

execution:
  stop_loss_execution: intraday_stop

selection:
  min_score: 70
  fallback_min_score: 65
  min_confidence: 0.70
  allow_top_pick_when_no_selection: true
  top_pick_min_score: 65
  max_selected: 5
  max_rsi_for_new_position: 65
  reject_overheated_rsi: true

risk_margin:
  max_daily_buy_amount: 300000
  max_single_order_amount: 200000
  stop_trading_if_daily_loss_rate_exceeds: -0.05
  stop_trading_if_drawdown_exceeds: -0.15
