# AI Fund Lab profile YAML
# rookie_dealer_02_v2_1 をベースに決算予定日フィルターを追加した検証用profileです。
# 秘密情報は書かず、APIキーや口座情報は .env に置きます。

profile_id: rookie_dealer_02_v2_7
profile_name: 新人ディーラー2号 v2.7
description: v2.1に決算予定日フィルターを追加した検証版

features:
  market_context: true
  sector_analysis: true
  ai_decision: false
  news: false
  candlestick_analysis: true
  openai_commentary: false

selection:
  min_score: 45
  fallback_min_score: 40
  min_confidence: 0.70
  allow_top_pick_when_no_selection: true
  top_pick_min_score: 40
  max_selected: 5
  max_rsi_for_new_position: 65
  reject_overheated_rsi: true

volume_filter:
  enabled: true
  min_volume_ratio: 2.0

earnings_filter:
  enabled: true
  block_on_earnings_day: true
  block_before_business_days: 1
  block_after_business_days: 1
  action: reject_new_buy
  allow_sell: true
  fail_open: true
