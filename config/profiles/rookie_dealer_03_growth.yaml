# AI Fund Lab profile YAML
# rookie_dealer_02_v2_1 をベースに、東証グロース中心へ市場区分を切り替える検証profileです。

profile_id: rookie_dealer_03_growth
profile_name: 新人ディーラー3号 Growth
description: 新人ディーラー2号 v2.1のルールをベースに、東証グロースのみを売買対象にする攻撃型検証版

character:
  role: 新人ディーラー
  personality:
    - データ重視
    - 短期成長株検証
    - 損切り最優先
    - 出来高確認を重視
  catchphrases:
    - グロース市場だけを検証します
    - 出来高と損切りを優先します

features:
  market_context: true
  sector_analysis: true
  ai_decision: false
  news: false
  candlestick_analysis: true
  openai_commentary: false

scoring:
  total_score_formula: technical_plus_relative_strength_market_penalty

ai_decision:
  enabled: false
  provider: openai
  fallback_to_rule_based: true
  daily_call_limit: 3

ai_commentary:
  enabled: true
  provider: rule_based
  fallback_to_rule_based: true

initial_capital: 1000000

trading:
  max_positions: 5
  position_size_ratio: 0.20
  stop_loss_rate: -0.03
  take_profit_rate: 0.06
  max_holding_days: 5
  use_round_lot: true
  round_lot_size: 100

execution:
  stop_loss_execution: intraday_stop

selection:
  min_score: 45
  fallback_min_score: 40
  min_confidence: 0.70
  allow_top_pick_when_no_selection: true
  top_pick_min_score: 40
  max_selected: 5
  max_rsi_for_new_position: 65
  reject_overheated_rsi: true

market_filter:
  prime: false
  standard: false
  growth: true
  allow_unknown_market: false
  risk_off_min_score: 50

volume_filter:
  enabled: true
  min_volume_ratio: 2.0

earnings_filter:
  enabled: false
  block_on_earnings_day: true
  block_before_business_days: 1
  block_after_business_days: 1
  action: reject_new_buy
  allow_sell: true
  fail_open: true

risk_margin:
  max_daily_buy_amount: 300000
  max_single_order_amount: 200000
  stop_trading_if_daily_loss_rate_exceeds: -0.05
  stop_trading_if_drawdown_exceeds: -0.15
