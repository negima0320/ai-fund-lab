dealer:
  id: rookie_dealer_001
  name: 新人ディーラー1号
  persona: 証券会社の研修を終えたばかりの、教科書通りでお堅い新人ディーラー

data_provider: dummy

broker:
  provider: paper
  # provider: tachibana_demo
  # provider: tachibana_live
  # provider: kabu_station
  live_trading_enabled: false

tachibana:
  environment: demo
  demo_base_url: "https://demo-kabuka.e-shiten.jp/e_api_v4r9/"
  live_base_url: "https://kabuka.e-shiten.jp/e_api_v4r9/"
  auth_method: "public_key_v4r9"
  user_id_env: "TACHIBANA_USER_ID"
  password_env: "TACHIBANA_PASSWORD"
  second_password_env: "TACHIBANA_SECOND_PASSWORD"
  private_key_path_env: "TACHIBANA_PRIVATE_KEY_PATH"
  public_key_id_env: "TACHIBANA_PUBLIC_KEY_ID"
  request_timeout_seconds: 10
  account_type: "cash"
  product: "stock"
  market: "tse"

kabu_station:
  enabled: false
  api_base_url: "http://localhost:18080/kabusapi"
  api_password_env: "KABU_STATION_API_PASSWORD"
  symbol_exchange: 1
  product_type: 0
  account_type: 4
  order_type: "market"
  time_in_force: "day"

jquants:
  plan: free
  rate_limit_per_minute: 5
  request_timeout_seconds: 20

database:
  path: storage/ai_fund_lab.sqlite3

universe:
  market: 東証プライム
  candidate_count: 50

portfolio:
  initial_cash: 1000000
  max_positions: 5
  max_allocation_per_symbol: 0.20
  reinvest_profits: true

trading:
  round_lot_size: 100
  use_round_lot: true
  allow_fractional_shares: false

execution:
  use_next_day_open_execution: true

costs:
  enabled: true
  commission_rate: 0.0
  min_commission: 0
  tax_rate: 0.20315
  apply_tax_on_profit: true

news:
  provider: google_news_rss
  enabled: true
  lookback_days: 7
  cache_enabled: true

# コメント生成方式
# rule_based: API不要、無料、安定
# openai: 自然な文章になるがAPIコストが発生
# OPENAI_API_KEYが未設定の場合は、自動的にrule_basedへフォールバックする
ai_commentary:
  provider: rule_based
  # provider: openai
  model: gpt-4.1-mini
  enabled: true
  fallback_to_rule_based: true

# OpenAI APIによる最終判断を使うかどうか
# falseの場合、ルールベースのスコアリング結果だけで売買判断する
# OPENAI_API_KEYが未設定の場合は、自動的にrule_basedへフォールバックする
ai_decision:
  enabled: false  # trueにするとOpenAIによる最終判断を利用
  provider: openai
  model: gpt-4.1-mini
  max_candidates: 50
  max_selected: 5
  min_score: 65
  fallback_to_rule_based: true
  save_prompt: true
  save_response: true
  daily_call_limit: 3

safety:
  mode: paper
  allow_live_trading: false
  require_manual_approval_for_live: true
  max_daily_buy_amount: 300000
  max_daily_sell_amount: 1000000
  max_orders_per_day: 10
  max_single_order_amount: 200000
  stop_trading_if_daily_loss_rate_exceeds: -0.05
  stop_trading_if_drawdown_exceeds: -0.15
  emergency_stop_file: storage/STOP_TRADING

risk:
  stop_loss_pct: -0.03
  take_profit_pct: 0.06
  max_holding_business_days: 5
  no_human_intervention: true
  no_long_term_bagholding: true
  ai_rule_change_allowed: false

scoring:
  technical_max: 50
  news_max: 30
  financial_max: 20
  total_max: 100
  confidence_min_for_buy: 0.55

selection:
  min_score: 70
  fallback_min_score: 65
  min_confidence: 0.70
  allow_top_pick_when_no_selection: true
  top_pick_min_score: 65
  max_selected: 5

paths:
  logs_dir: logs
  reports_dir: reports
  articles_drafts_dir: articles/drafts

articles:
  keep_draft_after_publish: false
